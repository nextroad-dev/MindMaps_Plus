<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMaps Plus - 代码流程图生成工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Monaco Editor -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
</head>
<body class="bg-light">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-diagram-3-fill me-2"></i>
                <span>MindMaps Plus</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="nav-create">
                            <i class="bi bi-plus-circle me-1"></i> 创建流程图
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="nav-history">
                            <i class="bi bi-clock-history me-1"></i> 历史记录
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container py-4">
        <!-- 创建流程图页面 -->
        <div id="create-page">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0"><i class="bi bi-code-square me-2"></i>代码转流程图</h2>
                <div class="d-flex">
                    <div class="dropdown me-2">
                        <button class="btn btn-outline-primary dropdown-toggle" type="button" id="codeExamplesDropdown" data-bs-toggle="dropdown">
                            <i class="bi bi-file-earmark-code me-1"></i> 示例代码
                        </button>
                        <ul class="dropdown-menu" aria-labelledby="codeExamplesDropdown">
                            <li><a class="dropdown-item" href="#" data-example="python">Python 示例</a></li>
                            <li><a class="dropdown-item" href="#" data-example="javascript">JavaScript 示例</a></li>
                            <li><a class="dropdown-item" href="#" data-example="java">Java 示例</a></li>
                        </ul>
                    </div>
                    <button class="btn btn-outline-danger" id="clear-btn">
                        <i class="bi bi-trash me-1"></i> 清空
                    </button>
                </div>
            </div>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                            <h5 class="mb-0"><i class="bi bi-input-cursor-text me-2"></i>代码输入</h5>
                            <div>
                                <select class="form-select form-select-sm" id="language-select">
                                    <option value="python">Python</option>
                                    <option value="javascript">JavaScript</option>
                                    <option value="java">Java</option>
                                    <option value="csharp">C#</option>
                                    <option value="cpp">C++</option>
                                </select>
                            </div>
                        </div>
                        <div class="card-body p-0">
                            <div id="code-editor" style="height: 450px;"></div>
                        </div>
                        <div class="card-footer bg-white">
                            <div class="mb-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-tag"></i></span>
                                    <input type="text" class="form-control" id="chart-title" placeholder="流程图标题（可选）">
                                </div>
                            </div>
                            <div class="mb-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-card-text"></i></span>
                                    <textarea class="form-control" id="chart-description" rows="2" placeholder="描述（可选）"></textarea>
                                </div>
                            </div>
                            <button class="btn btn-primary d-flex align-items-center justify-content-center w-100" id="generate-btn">
                                <i class="bi bi-diagram-2 me-2"></i> 生成流程图
                            </button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                            <h5 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>流程图预览</h5>
                            <div>
                                <button class="btn btn-sm btn-outline-primary me-1" id="save-btn" disabled>
                                    <i class="bi bi-save me-1"></i> 保存
                                </button>
                                <button class="btn btn-sm btn-outline-secondary" id="export-btn" disabled>
                                    <i class="bi bi-download me-1"></i> 导出
                                </button>
                            </div>
                        </div>
                        <div class="card-body position-relative">
                            <div id="loading-spinner" class="d-none">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                                <p class="text-center mt-2">正在生成流程图，请稍候...</p>
                            </div>
                            <div id="flowchart-container" class="flowchart-container bg-white rounded">
                                <div class="text-center text-muted py-5">
                                    <i class="bi bi-diagram-2 fs-1 mb-3 d-block"></i>
                                    <p>在左侧输入代码并点击"生成流程图"按钮</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 历史记录页面 -->
        <div id="history-page" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0"><i class="bi bi-clock-history me-2"></i>已保存的流程图</h2>
                <div class="input-group" style="max-width: 300px;">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" class="form-control" id="search-flowcharts" placeholder="搜索流程图...">
                </div>
            </div>
            <div class="row g-4" id="flowcharts-list">
                <!-- 这里会动态加载流程图卡片 -->
            </div>
        </div>
        
        <!-- 查看流程图页面 -->
        <div id="view-page" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 id="view-title" class="mb-0"><i class="bi bi-diagram-3 me-2"></i>流程图详情</h2>
                <div>
                    <button class="btn btn-outline-danger me-2" id="delete-btn">
                        <i class="bi bi-trash me-1"></i> 删除
                    </button>
                    <button class="btn btn-outline-primary" id="back-btn">
                        <i class="bi bi-arrow-left me-1"></i> 返回
                    </button>
                </div>
            </div>
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white">
                            <h5 class="mb-0"><i class="bi bi-code me-2"></i>源代码</h5>
                        </div>
                        <div class="card-body p-0">
                            <div id="view-code-editor" style="height: 400px;"></div>
                        </div>
                        <div class="card-footer bg-white">
                            <div class="d-flex justify-content-between">
                                <span><strong><i class="bi bi-code-slash me-1"></i> 语言:</strong> <span id="view-language" class="badge bg-primary"></span></span>
                                <span><strong><i class="bi bi-calendar me-1"></i> 创建于:</strong> <span id="view-created-at" class="text-muted"></span></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card shadow-sm h-100">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="bi bi-diagram-3 me-2"></i>流程图</h5>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary" id="view-export-btn">
                                    <i class="bi bi-download me-1"></i> 导出图片
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="view-flowchart-container" class="flowchart-container bg-white rounded"></div>
                        </div>
                        <div class="card-footer bg-white">
                            <p id="view-description" class="text-muted mb-0">
                                <i class="bi bi-info-circle me-1"></i>
                                <span class="description-text">无描述</span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer class="footer mt-auto py-3 bg-dark text-light">
        <div class="container text-center">
            <span>MindMaps Plus &copy; 2025 | 代码可视化工具</span>
        </div>
    </footer>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    
    <!-- Monaco Editor -->
    <script>var require = { paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } };</script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.nls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.js"></script>
    
    <script src="js/api.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/flowchart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
