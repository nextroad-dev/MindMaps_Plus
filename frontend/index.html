<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMaps Plus - 代码流程图生成工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Monaco Editor -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">MindMaps Plus</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" id="nav-create">创建流程图</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="nav-history">历史记录</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container mt-4">
        <!-- 创建流程图页面 -->
        <div id="create-page">
            <h2>代码转流程图</h2>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">代码输入</h5>
                            <div>
                                <select class="form-select" id="language-select">
                                    <option value="python">Python</option>
                                    <option value="javascript">JavaScript</option>
                                    <option value="java">Java</option>
                                    <option value="csharp">C#</option>
                                    <option value="cpp">C++</option>
                                </select>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="code-editor" style="height: 500px; border: 1px solid #ddd;"></div>
                        </div>
                        <div class="card-footer">
                            <div class="mb-3">
                                <input type="text" class="form-control" id="chart-title" placeholder="流程图标题（可选）">
                            </div>
                            <div class="mb-3">
                                <textarea class="form-control" id="chart-description" rows="2" placeholder="描述（可选）"></textarea>
                            </div>
                            <button class="btn btn-primary w-100" id="generate-btn">生成流程图</button>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">流程图预览</h5>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary" id="save-btn" disabled>保存流程图</button>
                                <button class="btn btn-sm btn-outline-secondary ms-2" id="export-btn" disabled>导出图片</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="loading-spinner" class="d-none">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">加载中...</span>
                                </div>
                                <p class="text-center mt-2">正在生成流程图，请稍候...</p>
                            </div>
                            <div id="flowchart-container" class="flowchart-container">
                                <div class="text-center text-muted py-5">
                                    <p>在左侧输入代码并点击"生成流程图"按钮</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 历史记录页面 -->
        <div id="history-page" class="d-none">
            <h2>已保存的流程图</h2>
            <div class="row" id="flowcharts-list">
                <div class="col-12 text-center py-5 text-muted">
                    <p>加载中...</p>
                </div>
            </div>
        </div>
        
        <!-- 查看流程图页面 -->
        <div id="view-page" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="view-title">流程图详情</h2>
                <button class="btn btn-outline-primary" id="back-btn">返回</button>
            </div>
            <div class="row g-4">
                <div class="col-md-5">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">代码</h5>
                        </div>
                        <div class="card-body">
                            <div id="view-code-editor" style="height: 400px; border: 1px solid #ddd;"></div>
                        </div>
                        <div class="card-footer">
                            <div class="d-flex justify-content-between">
                                <span><strong>语言:</strong> <span id="view-language"></span></span>
                                <span><strong>创建于:</strong> <span id="view-created-at"></span></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">流程图</h5>
                            <div>
                                <button class="btn btn-sm btn-outline-secondary" id="view-export-btn">导出图片</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="view-flowchart-container" class="flowchart-container"></div>
                        </div>
                        <div class="card-footer">
                            <p id="view-description" class="text-muted"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    
    <!-- Monaco Editor -->
    <script>var require = { paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } };</script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.nls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.js"></script>
    
    <script src="js/api.js"></script>
    <script src="js/editor.js"></script>
    <script src="js/flowchart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
